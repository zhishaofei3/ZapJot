<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quick Notes</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Tab Bar -->
    <div class="tab-bar">
      <div class="tabs" id="tabs"></div>
      <div class="tab-actions-wrapper">
        <div class="tab-actions-row">
          <button class="btn-tab-action btn-add-note" id="btn-add" title="Add new note">+</button>
          <button class="btn-tab-action btn-delete-note" id="btn-delete" title="Delete current note">−</button>
          <button class="btn-tab-action btn-settings" id="btn-settings" title="Settings">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
            </svg>
          </button>
        </div>
        <div class="tab-actions-row">
          <button class="btn-tab-action btn-insert-time" id="btn-insert-time" title="Insert current date and time">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
              <polyline points="12 6 12 12 16 14"/>
            </svg>
          </button>
          <button class="btn-tab-action btn-insert-date" id="btn-insert-date" title="Insert current date">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
          </button>
          <button class="btn-tab-action btn-insert-url" id="btn-insert-url" title="Insert current tab URL">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/>
              <path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Text Area -->
    <div class="content-area">
      <div id="note-content" contenteditable="true" placeholder="Start typing your notes here..."></div>
    </div>
  </div>

  <!-- Hidden file input for import -->
  <input type="file" id="file-input" accept=".txt" multiple style="display: none;">

  <!-- Settings Modal -->
  <div class="modal" id="settings-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Settings</h2>
        <button class="modal-close" id="modal-close">×</button>
      </div>
      <div class="modal-body">
        <div class="settings-section">
          <h3>Manage Categories</h3>
          <div class="category-list" id="category-list"></div>
          <div class="add-category">
            <input type="text" id="new-category-name" placeholder="New category name">
            <button class="btn-small" id="btn-add-category">Add</button>
          </div>
        </div>
        <div class="settings-section">
          <h3>Assign Notes to Categories</h3>
          <div class="note-assignment" id="note-assignment"></div>
        </div>
        <div class="settings-section">
          <h3>Popup Window Size</h3>
          <div class="window-size-settings">
            <div class="size-presets">
              <button class="btn-size-preset" data-width="350" data-height="450">Small</button>
              <button class="btn-size-preset" data-width="500" data-height="650">Medium</button>
              <button class="btn-size-preset" data-width="650" data-height="800">Large</button>
              <button class="btn-size-preset btn-custom-toggle" id="btn-custom-toggle">Custom</button>
            </div>
            <div class="custom-size" id="custom-size-panel" style="display: none;">
              <label>Custom Size:</label>
              <div class="custom-size-inputs">
                <input type="number" id="custom-width" placeholder="Width" min="300">
                <span class="size-separator">×</span>
                <input type="number" id="custom-height" placeholder="Height" min="400">
                <button class="btn-small" id="btn-apply-custom-size">Apply</button>
              </div>
            </div>
          </div>
        </div>
        <div class="settings-section">
          <h3>Note Background Theme</h3>
          <div class="theme-presets">
            <div class="theme-preset" data-theme="light" title="Light (White)">
              <div class="theme-preview theme-light"></div>
            </div>
            <div class="theme-preset" data-theme="warm" title="Warm">
              <div class="theme-preview theme-warm"></div>
            </div>
            <div class="theme-preset" data-theme="green" title="Green (Eye Care)">
              <div class="theme-preview theme-green"></div>
            </div>
            <div class="theme-preset" data-theme="dark" title="Dark">
              <div class="theme-preview theme-dark"></div>
            </div>
            <div class="theme-preset theme-custom-toggle" id="btn-theme-custom" title="Custom">
              <div class="theme-preview theme-custom-icon">⚙</div>
            </div>
          </div>
          
          <!-- Custom Theme Panel -->
          <div class="custom-theme-panel" id="custom-theme-panel" style="display: none;">
            <div class="custom-theme-row">
              <label>Background Color:</label>
              <input type="color" id="custom-bg-color" value="#ffffff">
            </div>
            <div class="custom-theme-row">
              <label>Text Color:</label>
              <input type="color" id="custom-text-color" value="#333333">
            </div>
            <div class="custom-theme-row">
              <label>Background Image:</label>
              <input type="file" id="bg-image-upload" accept="image/*">
            </div>
            <div class="theme-actions">
              <button class="btn-small" id="btn-apply-theme">Apply Theme</button>
              <button class="btn-small btn-cancel" id="btn-cancel-theme">Cancel</button>
            </div>
          </div>
        </div>
        <div class="settings-section">
          <h3>Text Size</h3>
          <div class="text-size-presets">
            <button class="btn-size-preset" data-size="12">Small</button>
            <button class="btn-size-preset" data-size="14">Medium</button>
            <button class="btn-size-preset" data-size="16">Large</button>
            <button class="btn-size-preset btn-custom-toggle" id="btn-text-size-custom">Custom</button>
          </div>
          <div class="custom-text-size" id="custom-text-size-panel" style="display: none;">
            <div class="custom-size-inputs">
              <input type="number" id="custom-font-size" placeholder="Font size" min="8" max="72">
              <span>px</span>
              <button class="btn-small" id="btn-apply-font-size">Apply</button>
            </div>
          </div>
        </div>
        <div class="settings-section">
          <h3>Import / Export</h3>
          <div class="import-export-buttons">
            <button class="btn-action" id="btn-import" title="Import notes">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/>
                <line x1="12" y1="15" x2="12" y2="3"/>
              </svg>
              Import Notes
            </button>
            <button class="btn-action" id="btn-export" title="Export notes">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                <polyline points="17 8 12 3 7 8"/>
                <line x1="12" y1="3" x2="12" y2="15"/>
              </svg>
              Export Notes
            </button>
          </div>
        </div>
        <div class="settings-section">
          <h3>About ZapJot</h3>
          <div class="about-section">
            <button class="btn-action btn-website" id="btn-visit-website" title="Visit official website">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <line x1="2" y1="12" x2="22" y2="12"/>
                <path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/>
              </svg>
              Official Site
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Rename Category Modal -->
  <div class="modal" id="rename-category-modal">
    <div class="modal-content modal-small">
      <div class="modal-header">
        <h2>Rename Category</h2>
        <button class="modal-close" id="rename-modal-close">×</button>
      </div>
      <div class="modal-body">
        <div class="rename-form">
          <input type="text" id="rename-category-input" placeholder="Category name">
          <input type="hidden" id="rename-category-id">
          <div class="rename-actions">
            <button class="btn-small btn-cancel" id="btn-cancel-rename">Cancel</button>
            <button class="btn-small btn-confirm" id="btn-confirm-rename">Save</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Confirm Delete Modal -->
  <div class="modal" id="confirm-delete-modal">
    <div class="modal-content modal-small">
      <div class="modal-header">
        <h2>Confirm Delete</h2>
        <button class="modal-close" id="confirm-delete-close">×</button>
      </div>
      <div class="modal-body">
        <div class="confirm-message" id="confirm-delete-message">
          Are you sure you want to delete this item?
        </div>
        <div class="rename-actions">
          <button class="btn-small btn-cancel" id="btn-cancel-delete">Cancel</button>
          <button class="btn-small btn-confirm btn-danger" id="btn-confirm-delete">Delete</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Set Note Title Modal -->
  <div class="modal" id="set-title-modal">
    <div class="modal-content modal-small">
      <div class="modal-header">
        <h2>Set Note Title</h2>
        <button class="modal-close" id="set-title-close">×</button>
      </div>
      <div class="modal-body">
        <div class="rename-form">
          <input type="text" id="set-title-input" placeholder="Enter note title (leave empty to use number)">
          <input type="hidden" id="set-title-note-id">
          <div class="rename-actions">
            <button class="btn-small btn-cancel" id="btn-cancel-title">Cancel</button>
            <button class="btn-small btn-confirm" id="btn-confirm-title">Save</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
